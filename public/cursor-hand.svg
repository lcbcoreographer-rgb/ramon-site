  <path d="M10 19 L28 19 L28 27 Q28 35 20 35 L9 35 Q2 35 2 27 L2 24 Q2 21 4 20 Q6 19 10 19 Z" fill="white" stroke="#1a1a2e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
