  <path d="M16 19 L16 8 Q16 5.5 18.5 5.5 Q21 5.5 21 8 L21 19" fill="white" stroke="#1a1a2e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Ring finger -->
  <path d="M21 19 L21 11 Q21 9 23 9 Q25 9 25 11 L25 19" fill="white" stroke="#1a1a2e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Pinky -->
  <path d="M25 19 L25 14 Q25 12 27 12 Q28 12 28 14 L28 19" fill="white" stroke="#1a1a2e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
