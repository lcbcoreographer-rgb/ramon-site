  <line x1="11" y1="9"  x2="15" y2="9"  stroke="#d0d8f0" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="13" x2="15" y2="13" stroke="#d0d8f0" stroke-width="1" stroke-linecap="round"/>
</svg>
