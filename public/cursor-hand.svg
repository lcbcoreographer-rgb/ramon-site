<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
  <!-- Index finger pointing up -->
  <path d="M10 19 L10 4 Q10 1 13 1 Q16 1 16 4 L16 19" fill="white" stroke="#1a1a2e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
